services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build:
      context: ./worker
    restart: unless-stopped
    privileged: true
    env_file:
      - .env
    environment:
      - GIT_SSH_COMMAND=ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new
    depends_on:
      - redis
    volumes:
      - workspace_data:/workspace/jobs
      - ${CODEX_HOST_CONFIG_DIR:-/root/.codex}:/root/.codex
      - ~/.ssh:/root/.ssh:ro

  webhook:
    build:
      context: ./webhook
    restart: unless-stopped
    ports:
      - "9000:8000"
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  redis_data:
  workspace_data:
